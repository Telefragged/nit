# Single source of truth for the Rust toolchain. rust-overlay reads this
# in flake.nix (devShell + build); rustup honours it for non-nix users.
[toolchain]
channel = "1.96.0"
profile = "minimal"
components = ["clippy", "rustfmt", "rust-src", "rust-analyzer"]
# nit-wasm compiles the shared fold to WebAssembly for the web (flake.nix
# `nitWasm`); rust-overlay and rustup both read this target list.
targets = ["wasm32-unknown-unknown"]
